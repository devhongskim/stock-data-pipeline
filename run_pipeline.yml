name: Weekday Cloud Stock Data Pipeline

on:
  schedule:
    # Runs at 01:30 UTC every Tuesday through Saturday 
    # (Captures the previous day's market data)
    - cron: '30 5 * * 2-6'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Master Data Pipeline
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_BRONZE_BUCKET: ${{ secrets.AWS_BRONZE_BUCKET }}
        
      run: |
        python main.py
